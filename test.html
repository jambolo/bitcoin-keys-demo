<!DOCTYPE html>
<html>
<head>
    <title>Test Bitcoin Library</title>
</head>
<body>
    <h1>Testing Bitcoin Library</h1>
    <script type="module">
        import * as secp256k1 from './node_modules/@noble/secp256k1/index.js';
        
        console.log('Noble secp256k1 loaded:', !!secp256k1);
        
        try {
            const testPrivateKey = new Uint8Array(32).fill(1);
            const testPublicKey = secp256k1.getPublicKey(testPrivateKey);
            console.log('Test successful:', !!testPublicKey);
            document.body.innerHTML += '<p style="color: green;">✅ Bitcoin library works!</p>';
        } catch (error) {
            console.error('Test failed:', error);
            document.body.innerHTML += '<p style="color: red;">❌ Bitcoin library failed: ' + error.message + '</p>';
        }
    </script>
</body>
</html>
